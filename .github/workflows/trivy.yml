name: trivy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '24 1 * * 5'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t frontend ./frontend

      - name: Build cart-service image
        run: docker build -t cart-service ./services/cart-service

      - name: Build product-service image
        run: docker build -t product-service ./services/product-service

      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'frontend'
          format: 'template'
          template: '@$HOME/.local/bin/trivy-bin/contrib/sarif.tpl'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true

      - name: Upload Trivy scan results to GitHub Security tab for frontend
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-frontend.sarif'
          category: 'trivy-frontend'

      - name: Run Trivy vulnerability scanner on cart-service
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'cart-service'
          format: 'template'
          template: '@$HOME/.local/bin/trivy-bin/contrib/sarif.tpl'
          output: 'trivy-results-cart-service.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      - name: Upload Trivy scan results to GitHub Security tab for cart-service
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-cart-service.sarif'
          category: 'trivy-cart-service'

      - name: Run Trivy vulnerability scanner on product-service
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: 'product-service'
          format: 'template'
          template: '@$HOME/.local/bin/trivy-bin/contrib/sarif.tpl'
          output: 'trivy-results-product-service.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          skip-setup-trivy: true

      - name: Upload Trivy scan results to GitHub Security tab for product-service
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-product-service.sarif'
          category: 'trivy-product-service'
